spring.application.name=school-management-system

#############################################################
server.port=8081
server.error.include-binding-errors=always
server.error.include-message=always
server.error.include-stacktrace=never

###########################################################
spring.datasource.url=jdbc:postgresql://localhost:5432/school_management
spring.datasource.username=user_ucs
spring.datasource.password=5710

###########################################################
spring.jpa.hibernate.ddl-auto=update

##########################################################
logging.file.name=log/studentmanagementapp.log
logging.pattern.file="%d %-5level [%thread] %logger:%msg%n"
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=INFO
logging.level.com.tpe=INFO

###########################################################
backendapi.app.jwtSecret=SchoolManagementProjectSecretKeyForJWTGeneration2026!
backendapi.app.jwtExpirationMs=86400000

###########################################################
midterm.exam.impact.percentage=0.40
final.exam.impact.percentage=0.60